spring:
    datasource:
        url: "jdbc:postgresql://localhost:5432/mtg-price-scalper"
        username: "postgres"
        password: "${POSTGRES_PASSWORD}"
    jpa:
        show-sql: true
        properties:
            hibernate:
                dialect: "org.hibernate.dialect.PostgreSQLDialect"
                ddl-auto: "validate"
    flyway:
        url: "jdbc:postgresql://localhost:5432/mtg-price-scalper"
        user: "postgres"
        password: "${POSTGRES_PASSWORD}"
        locations: "classpath:db/migration"
        enabled: true
    
    server:
        port: 8080
    
    actuator:
        enabled: true
        health:
            enabled: true